name: HTTP Tunnel Relay
on:
  workflow_dispatch:
  schedule:
    - cron: '*/3 * * * *'

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: |
          set -e
          echo Decoding relay...
          echo  | base64 -d > /tmp/relay.js
          echo Starting relay...
          node /tmp/relay.js &
          RELAY_PID=$!
          echo Connecting to serveo.net...
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 80:localhost:8888 serveo.net 2>&1 &
          sleep 10
          echo Running...
          wait
