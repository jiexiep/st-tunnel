name: HTTP Tunnel Relay
on:
  workflow_dispatch:
  schedule:
    - cron: '*/3 * * * *'

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Start relay
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          set -e
          echo "Starting HTTP tunnel relay..."

          cat > /tmp/relay.js << 'EOF'
const http = require('http');
const https = require('https');

const GIST_ID = process.env.GIST_ID;
const GH_TOKEN = process.env.GH_TOKEN;
const PORT = 8888;
let pending = {};

function ghApi(method, path, data) {
  return new Promise((resolve, reject) => {
    const opts = {
      hostname: 'api.github.com', path, method,
      headers: {
        'Authorization': `token ${GH_TOKEN}`,
        'Accept': 'application/vnd.github.v3+json',
        'User-Agent': 'tunnel-relay/1.0',
        'Content-Type': 'application/json'
      }
    };
    const req = https.request(opts, (res) => {
      let body = '';
      res.on('data', c => body += c);
      res.on('end', () => { try { resolve(JSON.parse(body)); } catch { resolve(body); } });
    });
    req.on('error', reject);
    if (data) req.write(JSON.stringify(data));
    req.end();
  });
}

async function getState() {
  const gist = await ghApi('GET', `/gists/${GIST_ID}`);
  try { return JSON.parse(gist.files.q.content); } catch { return {}; }
}

async function setState(state) {
  await ghApi('PATCH', `/gists/${GIST_ID}`, { files: { q: { content: JSON.stringify(state) } } });
}

async function pollLoop() {
  while (true) {
    try {
      const state = await getState();
      let changed = false;
      for (const key of Object.keys(state)) {
        if (key.startsWith('resp_')) {
          const reqId = key.slice(5);
          if (pending[reqId]) {
            pending[reqId].resolve(state[key]);
            delete pending[reqId];
            delete state[key];
            changed = true;
          }
        }
      }
      if (changed) await setState(state);
    } catch(e) {}
    await new Promise(r => setTimeout(r, 200));
  }
}

const server = http.createServer((req, resp) => {
  const reqId = Date.now() + '_' + Math.random().toString(36).slice(2,6);
  let body = [];
  req.on('data', c => body.push(c));
  req.on('end', async () => {
    const bodyBuf = Buffer.concat(body);
    const reqData = {
      method: req.method, path: req.url,
      headers: req.headers, body: bodyBuf.toString('base64')
    };
    console.log(`>>> ${req.method} ${req.url}`);
    try {
      const state = await getState();
      state[`req_${reqId}`] = reqData;
      await setState(state);
      const result = await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => resolve({code:504,headers:{},body:''}), 28000);
        pending[reqId] = { resolve: (r) => { clearTimeout(timeout); resolve(r); }, reject };
      });
      resp.writeHead(result.code || 502, result.headers || {});
      resp.end(Buffer.from(result.body || '', 'base64'));
      console.log(`<<< ${result.code || 502}`);
    } catch(e) {
      resp.writeHead(502);
      resp.end('Relay error: ' + e.message);
    }
  });
});

server.listen(PORT, () => { console.log('Relay on :'+PORT); pollLoop(); });
EOF

          node /tmp/relay.js &
          RELAY_PID=$!
          echo "Relay PID: $RELAY_PID"

          echo "Connecting to serveo.net..."
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 80:localhost:8888 serveo.net 2>&1 &
          SSH_PID=$!
          echo "SSH PID: $SSH_PID"

          sleep 10
          echo "Relay running. Sleeping..."
          sleep 540
          echo "Done"
