name: HTTP Tunnel Relay
on:
  workflow_dispatch:

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: |
          set -e
          pip install -q flask
          cat > /tmp/relay.py << 'PYEOF2'
import json, os, base64, threading, time
from flask import Flask, request, Response
import urllib.request, urllib.error

GIST_ID = os.environ['GIST_ID']
GH_TOKEN = os.environ['GH_TOKEN']
app = Flask(__name__)

def gh_api(method, path, data=None):
    url = 'https://api.github.com' + path
    headers = {
        'Authorization': 'token ' + GH_TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'User-Agent': 'relay/1.0', 'Content-Type': 'application/json'
    }
    req = urllib.request.Request(url, data=data, headers=headers, method=method)
    try:
        with urllib.request.urlopen(req, timeout=15) as resp:
            return json.loads(resp.read())
    except: return {}

p = {}
def poll():
    while True:
        try:
            g = gh_api('GET', '/gists/' + GIST_ID)
            s = json.loads(g.get('files',{}).get('q',{}).get('content','{}'))
            ok = False
            for k in list(s.keys()):
                if k.startswith('resp_'):
                    rid = k[5:]
                    if rid in p:
                        p[rid](s[k])
                        del p[rid]
                        del s[k]
                        ok = True
            if ok: gh_api('PATCH', '/gists/' + GIST_ID, json.dumps({'files':{'q':{'content':json.dumps(s)}}}).encode())
        except: pass
        time.sleep(0.2)

@app.route('/', defaults={'path': ''})
@app.route('/<path:path>', methods=['GET','POST','PUT','DELETE','PATCH','HEAD','OPTIONS'])
def proxy(path):
    import http.client
    rid = str(int(time.time()*1000)) + '_' + base64.b64encode(os.urandom(3)).decode()
    body = request.get_data()
    rd = {
        'method': request.method,
        'path': '/' + path,
        'headers': dict(request.headers),
        'body': base64.b64encode(body).decode() if body else ''
    }
    try:
        s = gh_api('GET', '/gists/' + GIST_ID)
        s['req_' + rid] = rd
        gh_api('PATCH', '/gists/' + GIST_ID, json.dumps({'files':{'q':{'content':json.dumps(s)}}}).encode())
        result = None
        ev = threading.Event()
        def cb(r):
            nonlocal result
            result = r
            ev.set()
        p[rid] = cb
        if not ev.wait(timeout=28):
            return Response('timeout', status=504)
        resp_headers = {k:v for k,v in result.get('headers',{}).items() if k.lower() not in ('transfer-encoding','content-encoding')}
        return Response(base64.b64decode(result.get('body','')), status=result.get('code',502), headers=resp_headers)
    except Exception as e:
        return Response('error: ' + str(e), status=502)

t = threading.Thread(target=poll, daemon=True)
t.start()
app.run(host='0.0.0.0', port=8888, threaded=True)
PYEOF2
          cat > /tmp/ssh_tunnel.sh << 'SH'
#!/bin/bash
ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 80:localhost:8888 serveo.net 2>&1 | while read line; do
  echo "$line"
  URL=$(echo "$line" | grep -oP 'https?://\S+[a-zA-Z0-9/]')
  if [ -n "$URL" ]; then
    echo "URL=$URL"
    python3 -c "
import json, urllib.request
data = json.dumps({'files':{'q':{'content':json.dumps({'url':'$URL'})}}}).encode()
req = urllib.request.Request('https://api.github.com/gists/${{ secrets.GIST_ID }}',
  data=data, headers={
    'Authorization': 'token ${{ secrets.GH_TOKEN }}',
    'Content-Type': 'application/json',
    'User-Agent': 'relay'
  }, method='PATCH')
urllib.request.urlopen(req)
"
    echo "Written URL to gist"
  fi
done
