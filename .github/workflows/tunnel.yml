name: HTTP Tunnel Relay
on:
  workflow_dispatch:
  schedule:
    - cron: '*/3 * * * *'

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          set -e
          JS_CODE=$(cat << 'JSEOF'
const http = require('http');
const https = require('https');
const GID = process.env.GIST_ID;
const TOK = process.env.GH_TOKEN;
const PORT = 8888;
let pending = {};
function api(m, p, d) {
  return new Promise((res, rej) => {
    const o = { hostname: 'api.github.com', path: p, method: m, headers: {
      'Authorization': 'token ' + TOK,
      'Accept': 'application/vnd.github.v3+json',
      'User-Agent': 'relay/1.0', 'Content-Type': 'application/json'
    }};
    const r = https.request(o, (resp) => {
      let b = '';
      resp.on('data', c => b += c);
      resp.on('end', () => { try { res(JSON.parse(b)); } catch { res(b); } });
    });
    r.on('error', rej);
    if (d) r.write(JSON.stringify(d));
    r.end();
  });
}
async function getS() {
  const g = await api('GET', '/gists/' + GID);
  try { return JSON.parse(g.files.q.content); } catch { return {}; }
}
async function setS(s) {
  await api('PATCH', '/gists/' + GID, { files: { q: { content: JSON.stringify(s) } } });
}
async function poll() {
  while (true) {
    try {
      const s = await getS();
      let c = false;
      for (const k of Object.keys(s)) {
        if (k.startsWith('resp_')) {
          const id = k.slice(5);
          if (pending[id]) { pending[id].resolve(s[k]); delete pending[id]; delete s[k]; c = true; }
        }
      }
      if (c) await setS(s);
    } catch(e) {}
    await new Promise(r => setTimeout(r, 200));
  }
}
const srv = http.createServer((req, resp) => {
  const id = Date.now() + '_' + Math.random().toString(36).slice(2,6);
  let body = [];
  req.on('data', c => body.push(c));
  req.on('end', async () => {
    const buf = Buffer.concat(body);
    const rd = { method: req.method, path: req.url, headers: req.headers, body: buf.toString('base64') };
    try {
      const s = await getS();
      s['req_' + id] = rd;
      await setS(s);
      const r = await new Promise((res, rej) => {
        const to = setTimeout(() => res({code:504,headers:{},body:''}), 28000);
        pending[id] = { resolve: res, reject: rej };
      });
      resp.writeHead(r.code || 502, r.headers || {});
      resp.end(Buffer.from(r.body || '', 'base64'));
    } catch(e) { resp.writeHead(502); resp.end('err'); }
  });
});
srv.listen(PORT, () => { poll(); });
JSEOF
)
          echo "$JS_CODE" > /tmp/relay.js
          node /tmp/relay.js &
          sleep 3
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 80:localhost:8888 serveo.net 2>&1 |             while read line; do
              echo "$line"
              URL=$(echo "$line" | grep -oP 'https?://\S+[a-zA-Z0-9]')
              if [ -n "$URL" ]; then
                echo "Got URL: $URL"
                curl -s -X PATCH -H "Authorization: token $GH_TOKEN"                   -H "Accept: application/vnd.github.v3+json"                   "https://api.github.com/gists/$GIST_ID"                   -d "$(python3 -c "import json; print(json.dumps({'files':{'q':{'content':json.dumps({'url':'$URL'})}}}))")"
                echo " URL saved to gist"
              fi
            done
